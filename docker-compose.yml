services:
  assistant:
    build: .
    container_name: telegram-assistant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    environment:
      # переопределяем путь к БД, чтобы лежал в смонтированном томе
      DATABASE_URL: sqlite+aiosqlite:////app/data/app.db
      TZ: UTC
    volumes:
      - ./data:/app/data
    # лог-ротация, чтобы не разрастался диск
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
